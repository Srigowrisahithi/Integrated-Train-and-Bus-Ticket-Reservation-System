<!DOCTYPE html>
<html lang="en">
<head>
    <title>User Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
            color: black;
        }

        header, footer {
            background-color: orange;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            width: 400px;
            margin: 40px auto;
            border: 1px solid #ccc;
            padding: 25px;
            border-radius: 5px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #999;
            border-radius: 4px;
        }

        button {
            width: 100%;
            background-color: orange;
            color: white;
            padding: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkorange;
        }

        .register-link {
            text-align: center;
            margin-top: 15px;
        }

        .register-link a {
            color: orange;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>

    <script>
        function validateLogin() {
            let user = document.forms["loginForm"]["user"].value;
            let password = document.forms["loginForm"]["password"].value;

            let userRegex = /^[a-zA-Z0-9_@.]{4,}$/;

            if (!userRegex.test(user)) {
                alert("Enter valid Username or Email");
                return false;
            }
            if (password.length < 6) {
                alert("Password must be at least 6 characters");
                return false;
            }
            return true;
        }
    </script>
</head>

<body>

<header>Ticket Reservation System</header>

<div class="container">
    <h2>Login Form</h2>

    <form name="loginForm" action="login.php" method="post" onsubmit="return validateLogin()">
        <input type="text" name="user" placeholder="Username or Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <!-- New User Section -->
    <div class="register-link">
        New user? <a href="register.html">Register here</a>
    </div>
</div>

<footer>© 2026 Ticket Reservation System</footer>

</body>
</html>
